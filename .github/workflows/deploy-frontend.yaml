name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      use-cache:
        type: boolean
        default: true
  push:
    branches:
      - michael/gha

# TODO(enricozb): checkout contexts, see if these have to be env vars
env:
  ECR_REGISTRY_HOST: 566886264221.dkr.ecr.us-east-1.amazonaws.com
  GHA_DOCKER_CONTEXT: ./frontend/
  GHA_DOCKER_IMAGE_NAME: frontend
  GHA_DOCKERFILE: ./deploy/docker/frontend.Dockerfile

jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: ./.github/actions/publish-ecr
        with:
          aws-access-key-id: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
          context: ${{ env.GHA_DOCKER_CONTEXT }}
          dockerfile: ${{ env.GHA_DOCKERFILE }}
          registry-host: ${{ env.ECR_REGISTRY_HOST }}
          tags: |
            ${{ env.ECR_REGISTRY_HOST }}/${{ env.GHA_DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY_HOST }}/${{ env.GHA_DOCKER_IMAGE_NAME }}:latest
          use-cache: ${{ github.event.inputs.use-cache == 'true' }}

      - uses: ./.github/actions/configure-eks
        with:
          aws-access-key-id: ${{ secrets.ECR_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ECR_AWS_SECRET_ACCESS_KEY }}
          cluster-name: ${{ env.K8S_CLUSTER_NAME }}
          region: ${{ env.K8S_REGION }}
          run:
            kubectl apply -f frontend/deployment.yaml
            kubectl apply -f frontend/service.yaml
            kubectl apply -f ingress.yaml
            kubectl rollout restart deployment frontend-deployment
          working-directory: ${{ env.K8S_WORKING_DIR }}
