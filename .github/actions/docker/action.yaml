name: publish-docker
description: publish-docker

inputs:
  build-args:
    type: string
    required: false
    default: ""

  context:
    type: string
    required: true

  dockerfile:
    type: string
    required: true

  use-cache:
    type: boolean
    required: false
    default: true

  tags:
    type: string
    required: true

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v1

    - uses: docker/build-push-action@v2
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        builder: ${{ steps.buildx.outputs.name }}
        build-args: ${{ inputs.build-args }}
        push: true
        tags: ${{ inputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        no-cache: ${{ inputs.use-cache == 'false' }}
