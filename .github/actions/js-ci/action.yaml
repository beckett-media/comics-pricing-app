name: configure-eks
description: configure-eks

inputs:
  filter-paths:
    required: true

  node-version:
    required: false
    default: '16'

  working-directory:
    required: true

runs:
  using: composite
  steps:
    - uses: dorny/paths-filter@v2
      with:
        filters: ${{ inputs.filter-paths }}

    - # if: steps.filter.outputs.src == 'true'
      uses: actions/setup-node@v2
      with:
        node-version: ${{ inputs.node-version }}

    - # if: steps.filter.outputs.src == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        yarn install
        yarn run lint
