type WatchList @model @auth(rules: [{allow: owner}]) {
  id: ID!
  imageId: String
  issueId: String
  publisher: String
  name: String
  issue: String
}

enum ComicWaitingListStatus {
  PENDING
  APPROVED
  REJECTED
}

type ComicWaitingList @model @auth(
    rules: [
      { allow: public, operations: [create] }
      {
        allow: groups
        groups: ["admins"]
        operations: [read, create, update, delete]
      }
    ]
  ) {
  id: ID!
  name: String
  email: String
  status: ComicWaitingListStatus
}
 