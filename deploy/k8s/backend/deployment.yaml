apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  selector:
    matchLabels:
      app: backend-app
  template:
    metadata:
      labels:
        app: backend-app
    spec:
      containers:
        - name: backend
          image: 566886264221.dkr.ecr.us-east-1.amazonaws.com/backend:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: backend-volume
              mountPath: /secret
              readOnly: true
          env:
            - name: NODE_CONFIG_DIR
              value: /secret/default.json
      volumes:
        - name: backend-volume
          secret:
            secretName: backend-secret
      restartPolicy: Always
