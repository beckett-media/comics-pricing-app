apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
        - name: frontend
          image: 566886264221.dkr.ecr.us-east-1.amazonaws.com/frontend:latest
          imagePullPolicy: Always
      restartPolicy: Always
